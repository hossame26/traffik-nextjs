<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page introuvable — Traffik</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #08080B;
            color: #C5C5CC;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }
        nav {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #1E1E2A;
        }
        nav a {
            font-weight: 900;
            font-size: 1.25rem;
            color: #FAFAFC;
            text-decoration: none;
            letter-spacing: -0.02em;
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .code {
            font-weight: 900;
            font-size: clamp(5rem, 15vw, 10rem);
            background: linear-gradient(180deg, #FAFAFC 0%, #3A3A50 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }
        h1 {
            font-weight: 900;
            font-size: clamp(1.25rem, 3vw, 1.75rem);
            color: #FAFAFC;
            margin-top: 1rem;
        }
        p {
            font-weight: 300;
            color: #8888A0;
            margin-top: 0.75rem;
            max-width: 400px;
        }
        .cta {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 2rem;
            padding: 0.875rem 2rem;
            background: #FAFAFC;
            color: #08080B;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            border-radius: 999px;
            transition: opacity 0.2s;
        }
        .cta:hover { opacity: 0.85; }
        footer {
            padding: 1.5rem 2rem;
            border-top: 1px solid #1E1E2A;
            text-align: center;
            font-size: 0.8rem;
            color: #5A5A70;
        }
    </style>
</head>
<body>
    <nav><a href="/">TRAFFIK.</a></nav>
    <main>
        <div class="code">404</div>
        <h1>Page introuvable</h1>
        <p>La page que vous cherchez n'existe pas ou a été déplacée.</p>
        <a href="/" class="cta">Retour à l'accueil &rarr;</a>
    </main>
    <footer>&copy; 2026 Traffik. Tous droits réservés.</footer>
</body>
</html>
